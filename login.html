<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | World Currency Museum</title>


    <style>
      *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    background:#08121f;

}

/* Background */

.background{

    position:fixed;

    inset:0;


    transform:scale(1.08);

}

.overlay{

    position:fixed;

    inset:0;

    background:rgba(5,15,30,.75);

    backdrop-filter:blur(5px);

}

/* Login Card */

.login-card{

    position:relative;

    width:380px;

    max-width:90%;

    padding:25px 30px;

    border-radius:22px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    text-align:center;

    color:white;

    z-index:10;

    box-shadow:0 20px 50px rgba(0,0,0,.45);

    animation:popup .45s ease;

}

/* Logo */

.logo{

    font-size:42px;

    margin-bottom:4px;

}

/* Title */

.login-card h1{

    font-size:24px;

    margin-bottom:4px;

    color:#FFD54F;

}

.subtitle{

    color:#ddd;

    margin-bottom:15px;

}

/* Divider */

.divider{

    margin:15px 0;

    color:#ccc;

    position:relative;

}

.divider::before{

    content:"";

    position:absolute;

    left:0;

    top:50%;

    width:40%;

    height:1px;

    background:#666;

}

.divider::after{

    content:"";

    position:absolute;

    right:0;

    top:50%;

    width:40%;

    height:1px;

    background:#666;

}

/* Inputs */

input{

    width:100%;

    padding:14px;

    margin:10px 0;

    border:none;

    border-radius:12px;

    outline:none;

    font-size:15px;

}

/* Buttons */

button{

    width:100%;

    padding:11px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-size:16px;

    transition:.3s;

}

.google-btn{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:12px;

    background:white;

    color:#333;

    font-weight:bold;

}

.google-btn img{

    width:22px;

}

.google-btn:hover{

    transform:translateY(-2px);

}

.login-btn{

    margin-top:15px;

    background:#FFD54F;

    color:#111;

    font-weight:bold;

}

.login-btn:hover{

    background:#FFC107;

}

.register-btn{

    margin-top:12px;

    background:#2f6df6;

    color:white;

}

.register-btn:hover{

    background:#1b56d8;

}

/* Back */

.back-home{

    display:block;

    margin-top:15px;

    color:#ddd;

    text-decoration:none;

    transition:.3s;

}

.back-home:hover{

    color:white;

}

/* Animation */

@keyframes popup{

    from{

        opacity:0;

        transform:translateY(30px) scale(.9);

    }

    to{

        opacity:1;

        transform:translateY(0) scale(1);

    }

}

/* Mobile */

@media(max-width:500px){


.login-card h1{

    font-size:24px;

}

.logo{

    font-size:48px;

}

}

.hidden{

    display:none !important;

}


.modal{

    position:fixed;

    inset:0;

    display: flex;

    justify-content: center;

    align-items: center;

    background: rgba(0,0,0,.65);
    
    backdrop-filter: blur(6px);

    z-index: 9999;

}

.popup-box{

    width:360px;

    max-width:90%;

    background:#ffffff;

    color:#222;

    padding:30px;

    border-radius:18px;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,.35);

    position:relative;

}
    </style>

</head>

<body>

<div class="background"></div>

<div class="overlay"></div>

<div class="login-card">

    <div class="logo">

        🌎

    </div>

    <h1>

        World Currency Museum

    </h1>

    <p class="subtitle">

        Preserve • Explore • Collect

    </p>

    <button
        class="google-btn"
        onclick="googleLogin()">

        <img
        src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

        Continue with Google

    </button>

    <div class="divider">

        <span>OR</span>

    </div>

    <input
        type="email"
        id="email"
        placeholder="Email Address">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button
        class="login-btn"
        onclick="openLogin()">

        Login

    </button>

    <button
        class="register-btn"
        onclick="openRegister()">

        Create Account

    </button>

    <a
        href="index.html"
        class="back-home">

        ← Back to Home

    </a>

</div>


<div id="comingSoonPopup" class="modal hidden">

    <div class="popup-box">

        <span class="close-btn"
              onclick="closeComingSoon()">

            &times;

        </span>

        <h2>🚧 Coming Soon</h2>

        <p>

            Email & Password authentication
            will be available in a future update.

            <br><br>

            For now, please continue
            using Google Sign-In.

        </p>

        <button
            class="login-btn"
            onclick="closeComingSoon()">

            OK

        </button>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script src="login.js"></script>



</body>

</html>
