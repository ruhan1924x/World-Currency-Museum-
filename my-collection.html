<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Collection</title>

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    overflow-y:auto;

    background:#08121f;

    padding:40px 0;

}

/* Background */

.background{

    position:fixed;

    inset:0;


    transform:scale(1.08);

}

.overlay{

    position:fixed;

    inset:0;

    background:rgba(5,15,30,.75);

    backdrop-filter:blur(6px);

}

/* Main Card */

.container{

    position:relative;

    z-index:10;

    width:900px;

    max-width:95%;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:22px;

    padding:30px;

    color:white;

    box-shadow:0 20px 50px rgba(0,0,0,.45);

}

h1{

    color:#FFD54F;

    text-align:center;

    margin-bottom:10px;

}

.subtitle{

    text-align:center;

    color:#ddd;

    margin-bottom:25px;

    line-height:1.5;

}

/* Upload */

.upload-btn{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#FFD54F;

    color:#111;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;

}

.upload-btn:hover{

    background:#FFC107;

}

/* Preview */

#previewContainer{

    margin-top:20px;

    text-align:center;

}

#previewImage{

    display:none;

    width:100%;

    max-height:220px;

    object-fit:contain;

    border-radius:15px;

    border:2px solid rgba(255,255,255,.2);

}

/* Inputs */

input,
textarea{

    width:100%;

    margin-top:18px;

    padding:14px;

    border:none;

    border-radius:12px;

    outline:none;

    font-size:15px;

}

textarea{

    resize:none;

    height:120px;

}

/* Save */

.save-btn{

    width:100%;

    margin-top:20px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#2f6df6;

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:.3s;

}

.save-btn:hover{

    background:#1b56d8;

}

/* Collection */

.collection-list{

    margin-top:35px;

}

.empty{

    text-align:center;

    padding:30px;

    border:2px dashed rgba(255,255,255,.2);

    border-radius:15px;

}

.empty{

    font-size:20px;

}

.empty h3{

    margin-top:12px;

    color:#FFD54F;

}

.empty p{

    margin-top:8px;

    color:#ccc;

}

/* Back */

.back-btn{

    display:block;

    text-align:center;

    margin-top:30px;

    color:white;

    text-decoration:none;

}

.back-btn:hover{

    color:#FFD54F;

}



#collectionGrid{

    display:grid;

      grid-template-columns:repeat(auto-fit, minmax(160px,1fr));

    gap:20px;

    margin-top:20px;

}

.collection-card{

  overflow: visible;

    position: relative;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.12);

    border-radius:15px;

    padding:15px;

    transition: .3s;

}

.card-header{

  display: flex;

  justify-content: flex-end;

  position: relative;

  left: 14px;

  bottom: 15px;

}

.menu-btn{

  width: 35px;

  height: 35px;

  border: none;

  padding: 0;

  display: flex;

  border-radius: 50%;

  background: transparent;

  color: white;

  font-size: 22px;

  cursor: pointer;

  justify-content: center;

  align-items: center;
}

.menu{
  position: absolute;

  top: 40px;

  right: 0;

  display: none;

  flex-direction: column;

  min-width: 170px;

  background: #222;

  border-radius: 12px;

  overflow: hidden;

  box-shadow: 0 10px 25px rgba(0,0,0,.4);

  z-index: 100;
}

.menu button{

  width: 100%;

  padding: 12px 16px;

  border: none;

  background: none;

  color: white;

  text-align: right;

  cursor: pointer;

  font-size: 14px;
}

.menu button:hover{
  background: #333;
}

.delete-option{
  color: #ff6b6b;
}


.collection-card:hover{
  transform: translateY(-5px);

  background: rgba(255,255,255,.14);
}

.collection-card:hover .collection-image{

  transform: scale(1.05);
}

.collection-image{

    width:100%;

    object-fit:contain;

    border-radius:12px;

    margin-bottom:12px;

    display: block;

    transition: .35s;

}

.collection-card h3{

    color:#FFD54F;

    margin-bottom:8px;

}

.collection-card p{

    color:#ddd;

    font-size:14px;

}

.delete-btn{

    width:100%;

    margin-top:12px;

    padding:10px;

    border:none;

    border-radius:10px;

    background:#d32f2f;

    color:white;

    cursor:pointer;

    transition:.3s;

}

.delete-btn:hover{

    background:#b71c1c;

}

</style>

</head>

<body>

<div class="background"></div>

<div class="overlay"></div>

<div class="container">

    <h1>📚 My Collection</h1>

    <p class="subtitle">

        Upload your own banknotes and build your personal museum.

    </p>

    <button
        class="upload-btn"
        onclick="document.getElementById('imageInput').click()">

        ➕ Upload Banknote

    </button>

    <input
        type="file"
        id="imageInput"
        accept="image/*"
        hidden>

    <div id="previewContainer">

        <img
            id="previewImage"
            src="">

    </div>

    <input
        type="text"
        id="title"
        placeholder="Banknote Title">

    <textarea
        id="description"
        placeholder="Description (Optional)"></textarea>

    <button class="save-btn">

        💾 Save Collection

    </button>

    <div class="collection-list">

      <div id="collectionGrid"></div>

    </div>

    <a
        href="profile.html"
        class="back-btn">

        ← Back to Profile

    </a>

</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script src="my-collection.js"></script>




</body>

</html>
